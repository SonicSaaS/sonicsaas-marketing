<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SonicSaaS — Secure Firewall Fleet Management</title>
  <meta name="description" content="SonicSaaS is a secure, self-hosted management platform for SonicWall firewalls. SOC 2 compliant. Built for MSPs.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f172a; color: #e2e8f0;
    }
    .container { text-align: center; padding: 2rem; max-width: 600px; }
    h1 { font-size: 2.5rem; margin-bottom: 0.75rem; color: #38bdf8; }
    .tagline { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a {
      display: inline-block; padding: 0.75rem 1.5rem; border-radius: 0.5rem;
      text-decoration: none; font-weight: 500; transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.85; }
    .primary { background: #2563eb; color: #fff; }
    .secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SonicSaaS</h1>
    <p class="tagline">Secure firewall fleet management for MSPs.<br>SOC 2 compliant. Self-hosted.</p>
    <div class="links">
      <a href="https://app.sonicsaas.com" class="primary">Launch App</a>
      <a href="https://docs.sonicsaas.com" class="secondary">Documentation</a>
    </div>
  </div>
</body>
</html>
